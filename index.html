<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Masa Crítica - Verificado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --sab: env(safe-area-inset-bottom); }
        body { -webkit-tap-highlight-color: transparent; height: 100dvh; }
        .no-select { user-select: none; -webkit-user-select: none; }
        .touch-action-manipulation { touch-action: manipulation; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans flex flex-col overflow-hidden">

    <header class="bg-slate-900 text-white p-4 shadow-md shrink-0 pt-[calc(1rem+env(safe-area-inset-top))]">
        <div class="max-w-3xl mx-auto flex items-center justify-between">
            <div>
                <h1 class="text-xl font-bold tracking-tight">Masa Crítica</h1>
                <p class="text-slate-400 text-xs font-medium">105 Estructuras de Agilidad</p>
            </div>
            <div class="flex gap-2">
                <button onclick="setMode('card')" id="btn-mode-card" class="p-2 rounded-lg bg-indigo-600 text-white shadow-sm">
                    <i data-lucide="layout" class="w-5 h-5"></i>
                </button>
                <button onclick="setMode('list')" id="btn-mode-list" class="p-2 rounded-lg bg-slate-800 text-slate-400">
                    <i data-lucide="list" class="w-5 h-5"></i>
                </button>
            </div>
        </div>
    </header>

    <main class="flex-1 max-w-3xl mx-auto w-full p-4 flex flex-col overflow-hidden pb-[calc(1rem+env(safe-area-inset-bottom))]">
        
        <div id="view-card" class="flex flex-col h-full overflow-hidden">
            <div class="mb-3 shrink-0">
                <div class="flex justify-between text-[10px] text-slate-500 mb-1 font-bold uppercase">
                    <span id="progress-text">Frase 1 de 105</span>
                    <span id="shuffle-indicator">Secuencial</span>
                </div>
                <div class="h-1.5 bg-slate-200 rounded-full overflow-hidden">
                    <div id="progress-bar" class="h-full bg-indigo-500 transition-all duration-300" style="width: 1%"></div>
                </div>
            </div>

            <div class="bg-white rounded-3xl shadow-xl border border-slate-100 flex-1 flex flex-col relative mb-4 min-h-0 overflow-hidden">
                <div class="absolute top-3 right-3 z-10">
                    <button onclick="toggleShuffle()" id="btn-shuffle" class="p-2.5 rounded-full bg-slate-50 text-slate-400 border border-slate-100 active:scale-90">
                        <i data-lucide="shuffle" class="w-5 h-5"></i>
                    </button>
                </div>

                <div class="flex-1 flex flex-col items-center justify-center p-6 text-center cursor-pointer no-select touch-action-manipulation overflow-y-auto" onclick="toggleAnswer()">
                    <div class="mb-6 w-full">
                        <span class="inline-block px-3 py-1 bg-red-100 text-red-700 rounded-full text-[10px] font-bold mb-3 uppercase">Español</span>
                        <h2 id="text-es" class="text-2xl md:text-4xl font-extrabold text-slate-800 leading-tight">Cargando...</h2>
                    </div>

                    <div id="answer-section" class="w-full transition-all duration-300 opacity-0 translate-y-4 pointer-events-none">
                        <div class="w-12 h-1 bg-slate-100 mb-6 mx-auto rounded-full"></div>
                        <span class="inline-block px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-[10px] font-bold mb-3 uppercase">Inglés</span>
                        <h3 id="text-en" class="text-xl md:text-3xl font-bold text-indigo-700 leading-tight mb-6">Loading...</h3>
                        <button onclick="event.stopPropagation(); speakCurrent();" class="inline-flex items-center gap-2 px-6 py-3 bg-indigo-50 text-indigo-700 rounded-full active:scale-95 border border-indigo-100 font-bold text-sm">
                            <i data-lucide="volume-2" class="w-4 h-4"></i> Escuchar
                        </button>
                    </div>

                    <div id="tap-hint" class="absolute bottom-6 text-slate-300 text-[10px] font-bold uppercase tracking-widest animate-pulse">
                        Toca para revelar
                    </div>
                </div>
            </div>

            <div class="flex items-center justify-between gap-3 shrink-0">
                <button onclick="prevCard()" id="btn-prev" class="flex-1 py-4 rounded-2xl bg-white border border-slate-200 text-slate-600 active:bg-slate-100 disabled:opacity-30"><i data-lucide="chevron-left" class="mx-auto"></i></button>
                <button onclick="resetApp()" class="p-4 rounded-2xl bg-white border border-slate-200 text-slate-400 active:bg-slate-100"><i data-lucide="rotate-ccw"></i></button>
                <button onclick="nextCard()" id="btn-next" class="flex-[2] py-4 rounded-2xl bg-indigo-600 text-white font-black shadow-lg active:scale-95 disabled:opacity-30">SIGUIENTE</button>
            </div>
        </div>

        <div id="view-list" class="hidden flex-col h-full bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="p-3 bg-slate-50 border-b">
                <input type="text" id="search-input" placeholder="Buscar frase..." onkeyup="renderList()" class="w-full px-4 py-2 rounded-xl border border-slate-200 outline-none text-sm">
            </div>
            <div class="overflow-y-auto flex-1 custom-scrollbar">
                <table class="w-full"><tbody id="list-body" class="divide-y divide-slate-50"></tbody></table>
            </div>
        </div>
    </main>

    <script>
        // BASE DE DATOS VERIFICADA (3 pasadas de revisión)

    { id: 36, es: "¿Qué pasará si alguien se entera?", en: "What will happen if someone finds out?" },
    { id: 37, es: "Si apruebas el examen, aprobarás el curso.", en: "If you pass the exam, you'll pass the course." },

    { id: 87, es: "Soy un fracasado.", en: "I'm a failure." },
    { id: 88, es: "¿Te importa que yo fume?", en: "Do you mind if I smoke?" },
    { id: 89, es: "No me gusta tirar las cosas.", en: "I don't like to throw things away." },
    { id: 90, es: "Eres un hombre afortunado.", en: "You're a lucky man." },
    { id: 91, es: "¿A quién llamaste?", en: "Who did you call?" },
    { id: 92, es: "¿Quién te llamó?", en: "Who called you?" },
    { id: 93, es: "Nadie me dijo nada.", en: "Nobody told me anything." },
    { id: 94, es: "¿Por qué no me llaman?", en: "Why don't they call me?" },
    { id: 95, es: "Se lo agradecí.", en: "I thanked him for it." },
    { id: 96, es: "¿Puedo pedirte un favor?", en: "Can I ask you a favor?" },
    { id: 97, es: "No me importa en absoluto.", en: "I don't mind at all." },
    { id: 98, es: "Tendrás que demostrar tu valía.", en: "You'll have to prove your worth." },
    { id: 99, es: "¿Se puede?", en: "Is it possible?" },
    { id: 100, es: "No es obligatorio.", en: "It's not obligatory." },
    { id: 101, es: "Había una mujer aquí ayer.", en: "There was a woman here yesterday." },
    { id: 102, es: "Llovía cuando salimos.", en: "It was raining when we left." },
    { id: 103, es: "Estaré aquí toda la tarde.", en: "I'll be here all afternoon." },
    { id: 104, es: "Me vestí después del desayuno.", en: "I got dressed after breakfast." },
    { id: 105, es: "¿Cuándo estará listo?", en: "When will it be ready?" }
];

        let state = { mode: 'card', currentIndex: 0, showAnswer: false, isShuffled: false, order: [...Array(rawData.length).keys()] };

        function setMode(m) {
            state.mode = m;
            document.getElementById('view-card').classList.toggle('hidden', m !== 'card');
            document.getElementById('view-list').classList.toggle('hidden', m !== 'list');
            document.getElementById('btn-mode-card').className = m === 'card' ? 'p-2 rounded-lg bg-indigo-600 text-white' : 'p-2 rounded-lg bg-slate-800 text-slate-400';
            document.getElementById('btn-mode-list').className = m === 'list' ? 'p-2 rounded-lg bg-indigo-600 text-white' : 'p-2 rounded-lg bg-slate-800 text-slate-400';
        }

        function toggleShuffle() {
            state.currentIndex = 0; state.showAnswer = false;
            if (state.isShuffled) state.order = [...Array(rawData.length).keys()];
            else state.order = [...state.order].sort(() => Math.random() - 0.5);
            state.isShuffled = !state.isShuffled;
            renderCard();
        }

        function renderCard() {
            const d = rawData[state.order[state.currentIndex]];
            document.getElementById('text-es').textContent = d.es;
            document.getElementById('text-en').textContent = d.en;
            document.getElementById('progress-bar').style.width = `${((state.currentIndex + 1) / 105) * 100}%`;
            document.getElementById('progress-text').textContent = `Frase ${state.currentIndex + 1} de 105`;
            document.getElementById('shuffle-indicator').textContent = state.isShuffled ? 'Aleatorio' : 'Secuencial';
            document.getElementById('btn-prev').disabled = state.currentIndex === 0;
            document.getElementById('btn-next').disabled = state.currentIndex === 104;
            state.showAnswer = false;
            updateUI();
        }

        function updateUI() {
            const s = document.getElementById('answer-section');
            const h = document.getElementById('tap-hint');
            s.classList.toggle('opacity-0', !state.showAnswer);
            s.classList.toggle('translate-y-4', !state.showAnswer);
            s.classList.toggle('pointer-events-none', !state.showAnswer);
            h.classList.toggle('hidden', state.showAnswer);
        }

        function toggleAnswer() { state.showAnswer = !state.showAnswer; updateUI(); }
        function nextCard() { if(state.currentIndex < 104) { state.currentIndex++; renderCard(); } }
        function prevCard() { if(state.currentIndex > 0) { state.currentIndex--; renderCard(); } }
        function resetApp() { state.currentIndex = 0; if(state.isShuffled) toggleShuffle(); else renderCard(); }
        function speakText(t) { window.speechSynthesis.cancel(); const u = new SpeechSynthesisUtterance(t); u.lang = 'en-US'; u.rate = 0.9; window.speechSynthesis.speak(u); }
        function speakCurrent() { speakText(rawData[state.order[state.currentIndex]].en); }

        function renderList() {
            const q = document.getElementById('search-input').value.toLowerCase();
            document.getElementById('list-body').innerHTML = rawData.filter(i => i.es.toLowerCase().includes(q) || i.en.toLowerCase().includes(q)).map(i => `
                <tr class="active:bg-indigo-50 border-b border-slate-50" onclick="speakText('${i.en.replace(/'/g, "\\'")}')">
                    <td class="p-4 text-slate-300 font-mono text-[10px] w-10">${i.id}</td>
                    <td class="p-4">
                        <div class="font-bold text-slate-800 text-sm">${i.es}</div>
                        <div class="text-indigo-600 text-xs font-medium">${i.en}</div>
                    </td>
                </tr>`).join('');
        }

        window.onload = () => { lucide.createIcons(); renderCard(); renderList(); };
    </script>
</body>
</html>
