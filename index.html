<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Masa Crítica 2.0</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js"></script>
    
    <style>
        :root {
            --sab: env(safe-area-inset-bottom);
            --accent: #6C63FF;
            --accent2: #FF6584;
            --dark: #0F0E17;
            --card-bg: #1A1929;
            --surface: #231F38;
            --text: #FFFFFE;
            --muted: #A7A9BE;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--dark);
            color: var(--text);
            height: 100dvh;
            -webkit-tap-highlight-color: transparent;
            overflow: hidden;
        }
        h1, h2, h3, .font-display { font-family: 'Syne', sans-serif; }
        .no-select { user-select: none; -webkit-user-select: none; }
        .touch-action { touch-action: manipulation; }

        /* Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 3px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--surface); border-radius: 10px; }

        /* Card glow */
        .card-main {
            background: var(--card-bg);
            border: 1px solid rgba(108,99,255,0.15);
            box-shadow: 0 0 40px rgba(108,99,255,0.08), 0 20px 60px rgba(0,0,0,0.4);
            transition: box-shadow 0.3s ease;
        }
        .card-main.revealed {
            box-shadow: 0 0 60px rgba(108,99,255,0.18), 0 20px 60px rgba(0,0,0,0.4);
            border-color: rgba(108,99,255,0.3);
        }

        /* Answer reveal */
        #answer-section {
            transition: opacity 0.35s ease, transform 0.35s ease;
        }
        #answer-section.hidden-answer {
            opacity: 0;
            transform: translateY(12px);
            pointer-events: none;
        }

        /* Category badges */
        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 999px;
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }
        .badge-core { background: rgba(108,99,255,0.18); color: #a89fff; }
        .badge-bridge { background: rgba(255,101,132,0.18); color: #ff8fa3; }
        .badge-energy { background: rgba(255,193,7,0.15); color: #ffc107; }
        .badge-social { background: rgba(52,211,153,0.15); color: #34d399; }

        /* Mastered overlay */
        .mastered-overlay {
            position: absolute; inset: 0; border-radius: inherit;
            background: rgba(52,211,153,0.08);
            pointer-events: none; opacity: 0;
            transition: opacity 0.3s;
        }
        .card-main.mastered .mastered-overlay { opacity: 1; }

        /* Bottom nav */
        .nav-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding: 8px 4px;
            border-radius: 12px;
            color: var(--muted);
            font-size: 10px;
            font-weight: 600;
            transition: color 0.2s, background 0.2s;
            cursor: pointer;
        }
        .nav-btn.active { color: var(--accent); background: rgba(108,99,255,0.12); }

        /* Progress bar */
        #progress-bar {
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
        }

        /* Buttons */
        .btn-next {
            background: linear-gradient(135deg, var(--accent), #8B7CF8);
            box-shadow: 0 4px 20px rgba(108,99,255,0.4);
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .btn-next:active { transform: scale(0.96); box-shadow: 0 2px 10px rgba(108,99,255,0.3); }

        .btn-secondary {
            background: var(--surface);
            border: 1px solid rgba(255,255,255,0.06);
            transition: background 0.15s, transform 0.15s;
        }
        .btn-secondary:active { background: #2d2848; transform: scale(0.96); }

        /* Star button */
        .btn-star { transition: transform 0.2s, color 0.2s; }
        .btn-star:active { transform: scale(0.85); }
        .btn-star.starred { color: #ffc107; }

        /* List items */
        .list-item {
            border-bottom: 1px solid rgba(255,255,255,0.04);
            transition: background 0.15s;
            cursor: pointer;
        }
        .list-item:active { background: rgba(108,99,255,0.08); }

        /* Stats */
        .stat-card {
            background: var(--surface);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 16px;
        }

        /* Hint pulse */
        @keyframes pulse-hint { 0%,100% { opacity: 0.3; } 50% { opacity: 0.7; } }
        #tap-hint { animation: pulse-hint 2s ease-in-out infinite; }

        /* Category filter pills */
        .filter-pill {
            padding: 6px 14px;
            border-radius: 999px;
            font-size: 11px;
            font-weight: 600;
            border: 1px solid rgba(255,255,255,0.08);
            color: var(--muted);
            background: var(--surface);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .filter-pill.active-pill {
            background: rgba(108,99,255,0.25);
            border-color: rgba(108,99,255,0.5);
            color: #c5c0ff;
        }

        /* Swipe animation */
        @keyframes swipe-left { from { transform: translateX(0); opacity: 1; } to { transform: translateX(-60px); opacity: 0; } }
        @keyframes swipe-right { from { transform: translateX(0); opacity: 1; } to { transform: translateX(60px); opacity: 0; } }
        @keyframes slide-in-right { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes slide-in-left { from { transform: translateX(-40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .anim-swipe-left { animation: swipe-left 0.2s ease forwards; }
        .anim-swipe-right { animation: swipe-right 0.2s ease forwards; }
        .anim-in-right { animation: slide-in-right 0.25s ease forwards; }
        .anim-in-left { animation: slide-in-left 0.25s ease forwards; }

        input::placeholder { color: var(--muted); opacity: 0.6; }
        input { caret-color: var(--accent); }
    </style>
</head>
<body class="flex flex-col overflow-hidden">

    <header class="shrink-0 px-4 py-3 flex items-center justify-between" style="padding-top: calc(0.75rem + env(safe-area-inset-top))">
        <div>
            <h1 class="font-display text-lg font-bold tracking-tight" style="color: var(--text)">Masa Crítica</h1>
            <p class="text-xs font-medium" style="color: var(--muted)" id="total-label">120 estructuras · 0 dominadas</p>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="showPanel('stats')" id="hdr-stats" class="p-2 rounded-xl btn-secondary">
                <i data-lucide="bar-chart-2" class="w-4 h-4" style="color: var(--muted)"></i>
            </button>
            <button onclick="toggleShuffle()" id="btn-shuffle" class="p-2 rounded-xl btn-secondary">
                <i data-lucide="shuffle" class="w-4 h-4" id="shuffle-icon" style="color: var(--muted)"></i>
            </button>
        </div>
    </header>

    <main class="flex-1 overflow-hidden flex flex-col px-4 pb-2" style="min-height:0">

        <div id="view-card" class="flex flex-col h-full">

            <div class="mb-3 shrink-0">
                <div class="flex justify-between text-xs mb-1.5 font-semibold" style="color: var(--muted)">
                    <span id="progress-text">1 / 120</span>
                    <span id="cat-label" class="badge badge-core">Core</span>
                </div>
                <div class="h-1 rounded-full overflow-hidden" style="background: var(--surface)">
                    <div id="progress-bar" class="h-full rounded-full" style="width: 1%"></div>
                </div>
            </div>

            <div id="card-main" class="card-main rounded-3xl flex-1 flex flex-col relative mb-4 min-h-0 overflow-hidden no-select touch-action" onclick="toggleAnswer()">
                <div class="mastered-overlay"></div>

                <button onclick="event.stopPropagation(); toggleMastered()" id="btn-star" class="btn-star absolute top-3 right-3 z-10 p-2.5 rounded-full" style="color: var(--muted)">
                    <i data-lucide="star" class="w-5 h-5"></i>
                </button>

                <div class="flex-1 flex flex-col items-center justify-center p-6 text-center overflow-y-auto custom-scrollbar">
                    <span class="badge badge-core mb-4" id="badge-es">Español</span>
                    <h2 id="text-es" class="font-display text-2xl md:text-3xl font-bold leading-tight mb-2" style="color: var(--text)">Cargando...</h2>

                    <div class="w-12 h-px my-4 rounded-full" style="background: rgba(255,255,255,0.08)"></div>

                    <div id="answer-section" class="hidden-answer w-full">
                        <span class="badge mb-4" style="background:rgba(108,99,255,0.18);color:#a89fff">English</span>
                        <h3 id="text-en" class="font-display text-xl md:text-2xl font-bold leading-tight mb-5" style="color: #a89fff">Loading...</h3>
                        <button onclick="event.stopPropagation(); speakCurrent();" class="inline-flex items-center gap-2 px-5 py-2.5 rounded-full font-semibold text-sm btn-secondary" style="color: var(--accent)">
                            <i data-lucide="volume-2" class="w-4 h-4"></i> Escuchar
                        </button>
                    </div>

                    <p id="tap-hint" class="absolute bottom-5 text-xs font-bold uppercase tracking-widest" style="color: var(--muted)">Toca para revelar</p>
                </div>
            </div>

            <div class="flex items-center gap-3 shrink-0" style="padding-bottom: calc(0.5rem + env(safe-area-inset-bottom))">
                <button onclick="prevCard()" id="btn-prev" class="btn-secondary p-4 rounded-2xl disabled:opacity-20" disabled>
                    <i data-lucide="chevron-left" class="w-5 h-5 mx-auto" style="color:var(--muted)"></i>
                </button>
                <button onclick="markAndNext()" class="btn-secondary p-4 rounded-2xl" title="Marcar dominada y avanzar">
                    <i data-lucide="check-circle" class="w-5 h-5 mx-auto" style="color:#34d399"></i>
                </button>
                <button onclick="nextCard()" id="btn-next" class="btn-next flex-1 py-4 rounded-2xl text-white font-display font-bold text-sm tracking-wide">
                    SIGUIENTE →
                </button>
            </div>
        </div>

        <div id="view-list" class="hidden flex-col h-full" style="min-height:0">
            <div class="shrink-0 mb-3">
                <input type="text" id="search-input" placeholder="Buscar frase..." onkeyup="renderList()"
                    class="w-full px-4 py-3 rounded-2xl text-sm font-medium outline-none"
                    style="background: var(--surface); color: var(--text); border: 1px solid rgba(255,255,255,0.06)">
            </div>
            <div class="flex gap-2 overflow-x-auto shrink-0 mb-3 pb-1 custom-scrollbar" style="scrollbar-width:none">
                <button class="filter-pill active-pill" onclick="setFilter('all', this)">Todas</button>
                <button class="filter-pill" onclick="setFilter('core', this)">Core</button>
                <button class="filter-pill" onclick="setFilter('bridge', this)">Puente</button>
                <button class="filter-pill" onclick="setFilter('energy', this)">Energía</button>
                <button class="filter-pill" onclick="setFilter('social', this)">Social</button>
                <button class="filter-pill" onclick="setFilter('mastered', this)">★ Dominadas</button>
            </div>
            <div class="flex-1 overflow-y-auto custom-scrollbar rounded-2xl" style="background: var(--card-bg); border: 1px solid rgba(255,255,255,0.05); min-height:0">
                <div id="list-body"></div>
            </div>
        </div>

        <div id="view-stats" class="hidden flex-col h-full overflow-y-auto custom-scrollbar gap-4 py-2">
            <h2 class="font-display text-xl font-bold shrink-0">Tu progreso</h2>
            <div class="grid grid-cols-2 gap-3 shrink-0">
                <div class="stat-card text-center">
                    <div class="font-display text-3xl font-bold" id="stat-mastered" style="color:#34d399">0</div>
                    <div class="text-xs mt-1 font-medium" style="color:var(--muted)">Dominadas</div>
                </div>
                <div class="stat-card text-center">
                    <div class="font-display text-3xl font-bold" id="stat-remaining" style="color:var(--accent)">120</div>
                    <div class="text-xs mt-1 font-medium" style="color:var(--muted)">Por dominar</div>
                </div>
                <div class="stat-card text-center">
                    <div class="font-display text-3xl font-bold" id="stat-pct" style="color:#ffc107">0%</div>
                    <div class="text-xs mt-1 font-medium" style="color:var(--muted)">Completado</div>
                </div>
                <div class="stat-card text-center">
                    <div class="font-display text-3xl font-bold" id="stat-session" style="color:#ff8fa3">0</div>
                    <div class="text-xs mt-1 font-medium" style="color:var(--muted)">Esta sesión</div>
                </div>
            </div>

            <div class="stat-card shrink-0">
                <p class="text-xs font-bold uppercase tracking-wider mb-3" style="color:var(--muted)">Por categoría</p>
                <div id="cat-breakdown" class="space-y-3"></div>
            </div>

            <button onclick="resetProgress()" class="btn-secondary py-3 rounded-2xl text-sm font-semibold shrink-0" style="color:var(--accent2)">
                Reiniciar progreso
            </button>
        </div>
    </main>

    <nav class="shrink-0 flex px-4 gap-1" style="padding-bottom: calc(0.75rem + env(safe-area-inset-bottom)); background: var(--dark); border-top: 1px solid rgba(255,255,255,0.04)">
        <button class="nav-btn active" id="nav-card" onclick="showPanel('card')">
            <i data-lucide="layout" class="w-5 h-5"></i>
            <span>Tarjetas</span>
        </button>
        <button class="nav-btn" id="nav-list" onclick="showPanel('list')">
            <i data-lucide="list" class="w-5 h-5"></i>
            <span>Lista</span>
        </button>
        <button class="nav-btn" id="nav-stats" onclick="showPanel('stats')">
            <i data-lucide="bar-chart-2" class="w-5 h-5"></i>
            <span>Progreso</span>
        </button>
    </nav>

        { id:96, cat:'social', es:"Te lo agradezco mucho.", en:"I really appreciate it." },
        { id:97, cat:'social', es:"No te preocupes por eso.", en:"Don't worry about it." },
        { id:98, cat:'social', es:"¿Qué tal te fue?", en:"How did it go?" },
        { id:99, cat:'social', es:"Te lo juro.", en:"I swear." },
        { id:100,cat:'social', es:"Cuéntame más.", en:"Tell me more." },

        // EXTRA core — frases de alta frecuencia adicionales
        { id:101,cat:'core', es:"¿Tienes un momento?", en:"Do you have a minute?" },
        { id:102,cat:'core', es:"Ya casi está.", en:"It's almost done." },
        { id:103,cat:'core', es:"No es exactamente lo que buscaba.", en:"That's not exactly what I was looking for." },
        { id:104,cat:'core', es:"Se me fue de la cabeza.", en:"It slipped my mind." },
        { id:105,cat:'core', es:"Ya era hora.", en:"It's about time." },
        { id:106,cat:'core', es:"¿Qué te parece si…?", en:"What if we…?" },
        { id:107,cat:'core', es:"No sabía que eso era una opción.", en:"I didn't know that was an option." },
        { id:108,cat:'core', es:"Vamos a ver.", en:"Let's see." },
        { id:109,cat:'core', es:"Tiene todo el sentido.", en:"That makes total sense." },
        { id:110,cat:'core', es:"Podría ser.", en:"Could be." },
        { id:111,cat:'core', es:"Lo dudo.", en:"I doubt it." },
        { id:112,cat:'core', es:"Hay que verlo para creerlo.", en:"You have to see it to believe it." },
        { id:113,cat:'core', es:"¿Me estás tomando el pelo?", en:"Are you kidding me?" },
        { id:114,cat:'core', es:"¿Qué se supone que significa eso?", en:"What's that supposed to mean?" },
        { id:115,cat:'core', es:"No es culpa mía.", en:"It's not my fault." },
        { id:116,cat:'core', es:"¿Qué está pasando?", en:"What's going on?" },
        { id:117,cat:'core', es:"Déjame en paz.", en:"Leave me alone." },
        { id:118,cat:'core', es:"No es momento para eso.", en:"This is not the time for that." },
        { id:119,cat:'core', es:"Estoy tratando de concentrarme.", en:"I'm trying to focus." },
        { id:120,cat:'core', es:"Cuanto antes, mejor.", en:"The sooner, the better." },
    ];

    const CAT_META = {
        core:   { label: 'Core',    badgeClass: 'badge-core',   color: '#a89fff' },
        bridge: { label: 'Puente',  badgeClass: 'badge-bridge', color: '#ff8fa3' },
        energy: { label: 'Energía', badgeClass: 'badge-energy', color: '#ffc107' },
        social: { label: 'Social',  badgeClass: 'badge-social', color: '#34d399' },
    };

    // ─── STATE ───────────────────────────────────────────────────────────────
    let state = {
        panel: 'card',
        currentIndex: 0,
        showAnswer: false,
        isShuffled: false,
        order: rawData.map((_, i) => i),
        mastered: new Set(JSON.parse(localStorage.getItem('mastered') || '[]')),
        sessionCount: 0,
        listFilter: 'all',
    };

    // ─── PERSIST ─────────────────────────────────────────────────────────────
    function saveMastered() {
        localStorage.setItem('mastered', JSON.stringify([...state.mastered]));
    }

    // ─── PANELS ──────────────────────────────────────────────────────────────
    function showPanel(p) {
        state.panel = p;
        ['card','list','stats'].forEach(v => {
            document.getElementById('view-' + v).classList.toggle('hidden', v !== p);
            document.getElementById('view-' + v).classList.toggle('flex', v === p);
        });
        ['card','list','stats'].forEach(v => {
            document.getElementById('nav-' + v).classList.toggle('active', v === p);
        });
        if (p === 'stats') renderStats();
        if (p === 'list') renderList();
    }

    // ─── CARD ─────────────────────────────────────────────────────────────────
    function renderCard(dir) {
        const d = rawData[state.order[state.currentIndex]];
        const cardEl = document.getElementById('card-main');

        // Animation
        if (dir) {
            const outClass = dir === 'next' ? 'anim-swipe-left' : 'anim-swipe-right';
            const inClass  = dir === 'next' ? 'anim-in-right'   : 'anim-in-left';
            cardEl.classList.add(outClass);
            setTimeout(() => {
                cardEl.classList.remove(outClass);
                cardEl.classList.add(inClass);
                setTimeout(() => cardEl.classList.remove(inClass), 250);
                _updateCardContent(d);
            }, 200);
        } else {
            _updateCardContent(d);
        }

        // Prev/Next buttons
        document.getElementById('btn-prev').disabled = state.currentIndex === 0;
        document.getElementById('btn-next').disabled = state.currentIndex === state.order.length - 1;
    }

    function _updateCardContent(d) {
        const meta = CAT_META[d.cat];
        document.getElementById('text-es').textContent = d.es;
        document.getElementById('text-en').textContent = d.en;
        document.getElementById('cat-label').textContent = meta.label;
        document.getElementById('cat-label').className = 'badge ' + meta.badgeClass;

        const total = getFilteredOrder().length || rawData.length;
        document.getElementById('progress-text').textContent = `${state.currentIndex + 1} / ${total}`;
        document.getElementById('progress-bar').style.width = `${((state.currentIndex + 1) / total) * 100}%`;

        // Mastered
        const isMastered = state.mastered.has(d.id);
        const cardEl = document.getElementById('card-main');
        cardEl.classList.toggle('mastered', isMastered);
        const starBtn = document.getElementById('btn-star');
        starBtn.classList.toggle('starred', isMastered);
        starBtn.querySelector('i').setAttribute('fill', isMastered ? 'currentColor' : 'none');

        state.showAnswer = false;
        _updateAnswerUI();
        updateHeaderLabel();
    }

    function _updateAnswerUI() {
        const s = document.getElementById('answer-section');
        const h = document.getElementById('tap-hint');
        const cardEl = document.getElementById('card-main');
        s.classList.toggle('hidden-answer', !state.showAnswer);
        h.classList.toggle('hidden', state.showAnswer);
        cardEl.classList.toggle('revealed', state.showAnswer);
    }

    function toggleAnswer() {
        state.showAnswer = !state.showAnswer;
        _updateAnswerUI();
    }

    function nextCard() {
        if (state.currentIndex < state.order.length - 1) {
            state.currentIndex++;
            renderCard('next');
        }
    }

    function prevCard() {
        if (state.currentIndex > 0) {
            state.currentIndex--;
            renderCard('prev');
        }
    }

    function markAndNext() {
        const d = rawData[state.order[state.currentIndex]];
        if (!state.mastered.has(d.id)) {
            state.mastered.add(d.id);
            state.sessionCount++;
            saveMastered();
        }
        nextCard();
    }

    function toggleMastered() {
        const d = rawData[state.order[state.currentIndex]];
        if (state.mastered.has(d.id)) {
            state.mastered.delete(d.id);
        } else {
            state.mastered.add(d.id);
            state.sessionCount++;
        }
        saveMastered();
        _updateCardContent(d);
    }

    function updateHeaderLabel() {
        document.getElementById('total-label').textContent =
            `${rawData.length} estructuras · ${state.mastered.size} dominadas`;
    }

    // ─── SHUFFLE ──────────────────────────────────────────────────────────────
    function getFilteredOrder() {
        return rawData.map((_, i) => i); // base — could add filter here
    }

    function toggleShuffle() {
        state.currentIndex = 0; state.showAnswer = false;
        if (state.isShuffled) {
            state.order = rawData.map((_, i) => i);
        } else {
            state.order = [...state.order].sort(() => Math.random() - 0.5);
        }
        state.isShuffled = !state.isShuffled;
        const icon = document.getElementById('shuffle-icon');
        icon.style.color = state.isShuffled ? 'var(--accent)' : 'var(--muted)';
        renderCard();
    }

    // ─── LIST ─────────────────────────────────────────────────────────────────
    function setFilter(f, el) {
        state.listFilter = f;
        document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active-pill'));
        el.classList.add('active-pill');
        renderList();
    }

    function renderList() {
        const q = (document.getElementById('search-input').value || '').toLowerCase();
        let items = rawData;
        if (state.listFilter !== 'all') {
            if (state.listFilter === 'mastered') items = items.filter(i => state.mastered.has(i.id));
            else items = items.filter(i => i.cat === state.listFilter);
        }
        if (q) items = items.filter(i => i.es.toLowerCase().includes(q) || i.en.toLowerCase().includes(q));
        document.getElementById('list-body').innerHTML = items.map(i => {
            const meta = CAT_META[i.cat];
            const isMastered = state.mastered.has(i.id);
            return `<div class="list-item px-4 py-3 flex items-center gap-3" onclick="speakText('${i.en.replace(/'/g,"\\'")}')">
                <span class="text-xs font-mono w-6 shrink-0 text-right" style="color:var(--muted)">${i.id}</span>
                <div class="flex-1 min-w-0">
                    <div class="font-semibold text-sm truncate" style="color:var(--text)">${i.es}</div>
                    <div class="text-xs truncate mt-0.5" style="color:${meta.color}">${i.en}</div>
                </div>
                <div class="flex items-center gap-2 shrink-0">
                    <span class="badge ${meta.badgeClass}">${meta.label}</span>
                    ${isMastered ? '<i data-lucide="star" class="w-3.5 h-3.5" style="color:#ffc107;fill:currentColor"></i>' : ''}
                </div>
            </div>`;
        }).join('');
        
        // Safety check para renderizar iconos en elementos generados dinámicamente
        if (typeof lucide !== 'undefined') {
            lucide.createIcons();
        }
    }

    // ─── STATS ────────────────────────────────────────────────────────────────
    function renderStats() {
        const m = state.mastered.size;
        const total = rawData.length;
        document.getElementById('stat-mastered').textContent = m;
        document.getElementById('stat-remaining').textContent = total - m;
        document.getElementById('stat-pct').textContent = Math.round(m / total * 100) + '%';
        document.getElementById('stat-session').textContent = state.sessionCount;

        // By category
        const cats = ['core','bridge','energy','social'];
        document.getElementById('cat-breakdown').innerHTML = cats.map(c => {
            const items = rawData.filter(i => i.cat === c);
            const done  = items.filter(i => state.mastered.has(i.id)).length;
            const pct   = Math.round(done / items.length * 100);
            const meta  = CAT_META[c];
            return `<div>
                <div class="flex justify-between text-xs mb-1">
                    <span class="font-semibold" style="color:${meta.color}">${meta.label}</span>
                    <span style="color:var(--muted)">${done}/${items.length}</span>
                </div>
                <div class="h-1.5 rounded-full overflow-hidden" style="background:var(--dark)">
                    <div class="h-full rounded-full transition-all" style="width:${pct}%;background:${meta.color}"></div>
                </div>
            </div>`;
        }).join('');
    }

    function resetProgress() {
        if (!confirm('¿Resetear todo el progreso?')) return;
        state.mastered.clear();
        state.sessionCount = 0;
        saveMastered();
        renderStats();
        updateHeaderLabel();
        renderCard();
    }

    // ─── SPEECH ───────────────────────────────────────────────────────────────
    function speakText(t) {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(t);
        u.lang = 'en-US'; u.rate = 0.9;
        window.speechSynthesis.speak(u);
    }
    function speakCurrent() { speakText(rawData[state.order[state.currentIndex]].en); }

    // ─── SWIPE ────────────────────────────────────────────────────────────────
    let touchStartX = 0, touchStartY = 0;
    document.getElementById('card-main').addEventListener('touchstart', e => {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
    }, { passive: true });
    document.getElementById('card-main').addEventListener('touchend', e => {
        const dx = e.changedTouches[0].clientX - touchStartX;
        const dy = e.changedTouches[0].clientY - touchStartY;
        if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 50) {
            if (dx < 0) nextCard(); else prevCard();
        }
    }, { passive: true });

    // ─── INIT ─────────────────────────────────────────────────────────────────
    window.onload = () => {
        // Safety check inicial
        if (typeof lucide !== 'undefined') {
            lucide.createIcons();
        }
        showPanel('card');
        renderCard();
        renderList();
    };
    </script>
</body>
</html>
