<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Masa Crítica - Repaso</title>
    <!-- Tailwind CSS para el diseño exacto -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Iconos Lucide (los mismos de la primera versión) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Mejoras para móvil */
        body { -webkit-tap-highlight-color: transparent; }
        .no-select { user-select: none; -webkit-user-select: none; }
        .touch-action-manipulation { touch-action: manipulation; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans flex flex-col h-screen overflow-hidden">

    <!-- Header -->

            </div>
            <div class="flex gap-2">
                <button onclick="setMode('card')" id="btn-mode-card" class="p-2 rounded-lg transition-colors bg-indigo-600 text-white shadow-sm">
                    <i data-lucide="layout"></i>
                </button>
                <button onclick="setMode('list')" id="btn-mode-list" class="p-2 rounded-lg transition-colors bg-slate-800 text-slate-400 hover:bg-slate-700">
                    <i data-lucide="list"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->

        <!-- VISTA TARJETAS (CARD MODE) -->
        <div id="view-card" class="flex flex-col h-full justify-center py-2 h-full">
            
            <!-- Progress Bar -->
            <div class="mb-4 shrink-0">
                <div class="flex justify-between text-xs text-slate-500 mb-1 font-medium">
                    <span id="progress-text">Frase 1 de 105</span>
                    <span id="shuffle-indicator" class="flex items-center gap-1">Secuencial</span>
                </div>
                <div class="h-2 bg-slate-200 rounded-full overflow-hidden">
                    <div id="progress-bar" class="h-full bg-indigo-500 transition-all duration-300 ease-out" style="width: 1%"></div>
                </div>
            </div>

            <!-- Card Container -->
            <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-slate-100 flex-1 flex flex-col relative w-full mb-4 transition-shadow hover:shadow-2xl">
                
                <!-- Shuffle Button -->
                <div class="absolute top-4 right-4 z-10">
                    <button onclick="toggleShuffle()" id="btn-shuffle" class="p-3 rounded-full transition-all bg-slate-50 text-slate-400 hover:bg-slate-100 active:scale-95 border border-slate-100">
                        <i data-lucide="shuffle" class="w-5 h-5"></i>
                    </button>
                </div>

                <!-- Card Content Area -->
                <div class="flex-1 flex flex-col items-center justify-center p-6 text-center cursor-pointer hover:bg-slate-50/30 transition-colors w-full touch-action-manipulation no-select" onclick="toggleAnswer()">
                    
                    <!-- Spanish Section -->
                    <div class="mb-8 w-full animate-fadeIn">
                        <span class="inline-block px-3 py-1 bg-red-100 text-red-700 rounded-full text-[10px] font-bold mb-4 tracking-wide uppercase shadow-sm">Español</span>
                        <h2 id="text-es" class="text-2xl md:text-4xl font-bold text-slate-800 leading-tight">Cargando...</h2>
                    </div>

                    <!-- English Section (Hidden by default) -->
                    <div id="answer-section" class="w-full transition-all duration-300 opacity-0 translate-y-4 pointer-events-none">
                        <div class="w-full h-px bg-slate-200 mb-6 mx-auto max-w-[120px]"></div>
                        <span class="inline-block px-3 py-1 bg-blue-100 text-blue-700 rounded-full text-[10px] font-bold mb-4 tracking-wide uppercase shadow-sm">Inglés</span>
                        <h3 id="text-en" class="text-xl md:text-3xl font-medium text-indigo-700 leading-tight mb-6">Loading...</h3>
                        
                        <button onclick="event.stopPropagation(); speakCurrent();" class="inline-flex items-center gap-2 px-5 py-2.5 bg-indigo-50 text-indigo-700 rounded-full hover:bg-indigo-100 transition-colors active:scale-95 shadow-sm border border-indigo-100">
                            <i data-lucide="volume-2" class="w-4 h-4"></i>
                            <span class="text-sm font-semibold">Escuchar</span>
                        </button>
                    </div>

                    <!-- Hint -->
                    <div id="tap-hint" class="absolute bottom-8 text-slate-400 text-xs font-medium animate-pulse flex items-center gap-2 uppercase tracking-wide">
                        <i data-lucide="eye" class="w-4 h-4"></i> Toca para ver respuesta
                    </div>
                </div>
            </div>

            <!-- Navigation Buttons -->
            <div class="flex items-center justify-between gap-3 shrink-0 mb-safe">
                <button onclick="prevCard()" id="btn-prev" class="flex-1 flex items-center justify-center gap-2 py-4 rounded-xl bg-white border border-slate-200 shadow-sm text-slate-600 font-semibold hover:bg-slate-50 disabled:opacity-50 disabled:cursor-not-allowed active:bg-slate-100 transition-all touch-action-manipulation">
                    <i data-lucide="chevron-left" class="w-5 h-5"></i> Anterior
                </button>
                
                <button onclick="resetApp()" class="p-4 rounded-xl bg-white border border-slate-200 shadow-sm text-slate-500 hover:text-indigo-600 active:bg-slate-100 transition-all" title="Reiniciar">
                    <i data-lucide="rotate-ccw" class="w-5 h-5"></i>
                </button>

                <button onclick="nextCard()" id="btn-next" class="flex-1 flex items-center justify-center gap-2 py-4 rounded-xl bg-indigo-600 shadow-lg shadow-indigo-200 text-white font-bold hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed active:scale-[0.98] transition-all touch-action-manipulation">
                    Siguiente <i data-lucide="chevron-right" class="w-5 h-5"></i>
                </button>
            </div>
        </div>

        <!-- VISTA LISTA (LIST MODE) -->
        <div id="view-list" class="hidden flex-col h-full bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <div class="p-4 border-b border-slate-100 bg-slate-50">
                <div class="relative">
                    <i data-lucide="search" class="absolute left-3 top-1/2 transform -translate-y-1/2 text-slate-400 w-4 h-4"></i>
                    <input type="text" id="search-input" placeholder="Buscar frase..." onkeyup="renderList()" 
                        class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-300 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all text-base bg-white">
                </div>
            </div>
            <div class="overflow-y-auto flex-1 p-0 custom-scrollbar">
                <table class="w-full text-left border-collapse">
                    <thead class="text-xs text-slate-500 uppercase bg-slate-50 sticky top-0 shadow-sm z-10">
                        <tr>
                            <th class="p-3 font-semibold text-center w-12">#</th>
                            <th class="p-3 font-semibold">Frase</th>
                        </tr>
                    </thead>
                    <tbody id="list-body" class="divide-y divide-slate-100 text-sm">
                        <!-- JS llenará esto -->
                    </tbody>
                </table>
            </div>
        </div>

    </main>

            { id: 91, es: "¿A quién llamaste?", en: "Who did you call?" },
            { id: 92, es: "¿Quién te llamó?", en: "Who called you?" },
            { id: 93, es: "Nadie me dijo nada.", en: "Nobody told me anything." },
            { id: 94, es: "¿Por qué no me llaman?", en: "Why don't they call me?" },
            { id: 95, es: "Se lo agradecí.", en: "I thanked him for it." },
            { id: 96, es: "¿Puedo pedirte un favor?", en: "Can I ask you a favor?" },
            { id: 97, es: "No me importa en absoluto.", en: "I don't mind at all." },
            { id: 98, es: "Tendrás que demostrar tu valía.", en: "You'll have to prove your worth." },
            { id: 99, es: "¿Se puede?", en: "Is it possible?" },
            { id: 100, es: "No es obligatorio.", en: "It's not obligatory." },
            { id: 101, es: "Había una mujer aquí ayer.", en: "There was a woman here yesterday." },
            { id: 102, es: "Llovía cuando salimos.", en: "It was raining when we left." },
            { id: 103, es: "Estaré aquí toda la tarde.", en: "I'll be here all afternoon." },
            { id: 104, es: "Me vestí después del desayuno.", en: "I got dressed after breakfast. " },
            { id: 105, es: "¿Cuándo estará listo?", en: "When will it be ready?" }
        ];

        // ESTADO GLOBAL
        let state = {
            mode: 'card', // 'card' or 'list'
            currentIndex: 0,
            showAnswer: false,
            isShuffled: false,
            order: [...Array(rawData.length).keys()], // [0, 1, 2... 104]
            searchTerm: ''
        };

        // REFERENCIAS AL DOM
        const els = {
            viewCard: document.getElementById('view-card'),
            viewList: document.getElementById('view-list'),
            btnModeCard: document.getElementById('btn-mode-card'),
            btnModeList: document.getElementById('btn-mode-list'),
            
            // Tarjeta
            textEs: document.getElementById('text-es'),
            textEn: document.getElementById('text-en'),
            answerSection: document.getElementById('answer-section'),
            tapHint: document.getElementById('tap-hint'),
            progressText: document.getElementById('progress-text'),
            progressBar: document.getElementById('progress-bar'),
            shuffleIndicator: document.getElementById('shuffle-indicator'),
            
            // Botones
            btnShuffle: document.getElementById('btn-shuffle'),
            btnPrev: document.getElementById('btn-prev'),
            btnNext: document.getElementById('btn-next'),
            
            // Lista
            listBody: document.getElementById('list-body'),
            searchInput: document.getElementById('search-input')
        };

        // INICIALIZACIÓN
        function init() {
            lucide.createIcons();
            renderCard();
            renderList();
        }

        // --- LÓGICA PRINCIPAL ---

        function setMode(mode) {
            state.mode = mode;
            if (mode === 'card') {
                els.viewCard.classList.remove('hidden');
                els.viewList.classList.add('hidden');
                els.viewList.classList.remove('flex');
                
                els.btnModeCard.classList.remove('bg-slate-800', 'text-slate-400');
                els.btnModeCard.classList.add('bg-indigo-600', 'text-white', 'shadow-sm');
                
                els.btnModeList.classList.add('bg-slate-800', 'text-slate-400');
                els.btnModeList.classList.remove('bg-indigo-600', 'text-white', 'shadow-sm');
            } else {
                els.viewCard.classList.add('hidden');
                els.viewList.classList.remove('hidden');
                els.viewList.classList.add('flex');
                
                els.btnModeList.classList.remove('bg-slate-800', 'text-slate-400');
                els.btnModeList.classList.add('bg-indigo-600', 'text-white', 'shadow-sm');
                
                els.btnModeCard.classList.add('bg-slate-800', 'text-slate-400');
                els.btnModeCard.classList.remove('bg-indigo-600', 'text-white', 'shadow-sm');
            }
        }

        function toggleShuffle() {
            state.showAnswer = false;
            state.currentIndex = 0;
            
            if (state.isShuffled) {
                // Reset a secuencial
                state.order = [...Array(rawData.length).keys()];
                state.isShuffled = false;
            } else {
                // Barajar (Algoritmo Fisher-Yates)
                let array = [...Array(rawData.length).keys()];
                for (let i = array.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
                state.order = array;
                state.isShuffled = true;
            }
            renderCard();
        }

        function nextCard() {
            if (state.currentIndex < state.order.length - 1) {
                state.currentIndex++;
                state.showAnswer = false;
                renderCard();
            }
        }

        function prevCard() {
            if (state.currentIndex > 0) {
                state.currentIndex--;
                state.showAnswer = false;
                renderCard();
            }
        }

        function resetApp() {
            state.currentIndex = 0;
            state.showAnswer = false;
            if (state.isShuffled) toggleShuffle(); // Esto reseteará el orden también
            renderCard();
        }

        function toggleAnswer() {
            state.showAnswer = !state.showAnswer;
            updateAnswerVisibility();
        }

        function speakCurrent() {
            const index = state.order[state.currentIndex];
            const text = rawData[index].en;
            speakText(text);
        }

        function speakText(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); // Detener anterior
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 0.9;
                window.speechSynthesis.speak(utterance);
            } else {
                alert("Tu navegador no soporta audio.");
            }
        }

        // --- RENDERIZADO VISUAL ---

        function updateAnswerVisibility() {
            if (state.showAnswer) {
                els.answerSection.classList.remove('opacity-0', 'translate-y-4', 'pointer-events-none');
                els.answerSection.classList.add('opacity-100', 'translate-y-0');
                els.tapHint.classList.add('hidden');
            } else {
                els.answerSection.classList.add('opacity-0', 'translate-y-4', 'pointer-events-none');
                els.answerSection.classList.remove('opacity-100', 'translate-y-0');
                els.tapHint.classList.remove('hidden');
            }
        }

        function renderCard() {
            const index = state.order[state.currentIndex];
            const data = rawData[index];

            // Textos
            els.textEs.textContent = data.es;
            els.textEn.textContent = data.en;
            
            // Barra progreso
            const progress = ((state.currentIndex + 1) / rawData.length) * 100;
            els.progressBar.style.width = `${progress}%`;
            els.progressText.textContent = `Frase ${state.currentIndex + 1} de ${rawData.length}`;
            
            // Estado Shuffle
            els.shuffleIndicator.innerHTML = state.isShuffled 
                ? '<i data-lucide="shuffle" class="w-3 h-3"></i> Aleatorio' 
                : 'Secuencial';
            
            if (state.isShuffled) {
                els.btnShuffle.classList.remove('bg-slate-50', 'text-slate-400');
                els.btnShuffle.classList.add('bg-indigo-100', 'text-indigo-700', 'border-indigo-200');
            } else {
                els.btnShuffle.classList.add('bg-slate-50', 'text-slate-400');
                els.btnShuffle.classList.remove('bg-indigo-100', 'text-indigo-700', 'border-indigo-200');
            }

            // Botones navegación (Estado disabled)
            els.btnPrev.disabled = state.currentIndex === 0;
            if(els.btnPrev.disabled) els.btnPrev.classList.add('opacity-50', 'cursor-not-allowed');
            else els.btnPrev.classList.remove('opacity-50', 'cursor-not-allowed');

            els.btnNext.disabled = state.currentIndex === state.order.length - 1;
            if(els.btnNext.disabled) els.btnNext.classList.add('opacity-50', 'cursor-not-allowed');
            else els.btnNext.classList.remove('opacity-50', 'cursor-not-allowed');

            // Resetear respuesta
            updateAnswerVisibility();
            
            // Actualizar iconos
            lucide.createIcons();
        }

        function renderList() {
            const term = els.searchInput.value.toLowerCase();
            const filtered = rawData.filter(item => 
                item.es.toLowerCase().includes(term) || 
                item.en.toLowerCase().includes(term)
            );

            let html = '';
            if (filtered.length === 0) {
                html = `
                    <tr>
                        <td colspan="2" class="p-8 text-center text-slate-400 flex flex-col items-center gap-2">
                            <i data-lucide="search-x" class="w-8 h-8 opacity-50"></i>
                            <span>No se encontraron frases.</span>
                        </td>
                    </tr>`;
            } else {
                filtered.forEach(item => {
                    const safeText = item.en.replace(/'/g, "\\'");
                    html += `
                        <tr class="hover:bg-indigo-50/50 transition-colors border-b border-slate-50 last:border-0 cursor-pointer group" onclick="speakText('${safeText}')">
                            <td class="p-3 text-slate-400 font-mono text-xs text-center align-top pt-4 select-none">${item.id}</td>
                            <td class="p-3">
                                <div class="font-medium text-slate-800 mb-1 leading-snug">${item.es}</div>
                                <div class="text-indigo-600 flex items-center gap-2 text-sm">
                                    ${item.en} 
                                    <i data-lucide="volume-2" class="w-3 h-3 opacity-0 group-hover:opacity-100 transition-opacity"></i>
                                </div>
                            </td>
                        </tr>
                    `;
                });
            }
            els.listBody.innerHTML = html;
            lucide.createIcons();
        }

        // Arrancar
        window.onload = init;

    </script>
</body>
</html>
